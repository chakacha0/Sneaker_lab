services:
  db:
    image: postgres:16-alpine
    container_name: sneakerlab-db
    command: ["postgres", "-c", "port=5434"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgre
      POSTGRES_DB: shoeses_shop
    ports:
      - "5434:5434"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shoeses_shop -p 5434"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sneakerlab-backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: "5434"
      DB_NAME: shoeses_shop
      DB_USER: postgres
      DB_PASSWORD: postgre
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8002:8000"
    volumes:
      - ./backend/static:/app/static

  frontend:
    build:
      context: ./Frontend/shop
      dockerfile: Dockerfile
    container_name: sneakerlab-frontend
    depends_on:
      - backend
    ports:
      - "3002:80"

volumes:
  postgres_data:
