services:
  db:
    image: postgres:16-alpine
    container_name: sneakerlab-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgre
      POSTGRES_DB: shoeses_shop
    ports:
      - "5432:5432"
      - "8000:8000"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shoeses_shop"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sneakerlab-backend
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    network_mode: "service:db"
    volumes:
      - backend_static:/app/static

  frontend:
    build:
      context: ./frontend/shop
      dockerfile: Dockerfile
    container_name: sneakerlab-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  backend_static:
